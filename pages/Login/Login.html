<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>UGB Parkly - Login</title>
        <link rel="stylesheet" href="../../styles/Login/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link id="mainFavicon" rel="icon" type="image/x-icon" href="../../assets/icons/user.svg" />
    </head>
    
    <body>
        <div class="login">
            <div class="left-side">
                <div class="logo-area">
                    <img src="../../assets/images/ugbParklyLogo.png"> 
                </div>
                <h1>Parkly Login</h1>
                <p class="subtitle">
                    Insira suas informações de cadastro para acessar a plataforma.
                </p>
            </div>
            <div class="right-side">
                <form class="form-login">
                    <h2>Dados de acesso do colaborador</h2>

                    <div class="input-group">
                        <label for="matricula">Matrícula</label>
                        <input type="number" id="matricula" required>
                    </div>
                
                    <div class="input-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" required>
                    </div>
                
                    <button type="submit" class="btn-login">
                        Entrar
                    </button>
                </form>
            </div>
        </div>
    </body>
</html>
