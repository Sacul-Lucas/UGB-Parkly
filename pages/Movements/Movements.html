<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>UGB Parkly - Movimentações</title>

        <link rel="stylesheet" href="../../styles/Movements/Movements.css">
        <script src="../../functions/movements.js" defer></script>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link id="mainFavicon" rel="icon" type="image/x-icon" href="../../assets/icons/leftRight.svg" />
    </head>
    <body>
        <main>
            <nav class="sidebar">

                <div class="sidebar-header">
                    <div class="logo">
                        <img src="../../assets/images/ugbParklyLogo.png" alt="UGB Parkly">
                        <span>UGB Parkly</span>
                    </div>
                </div>
            
                <ul class="menu">
                    <li>
                        <a href="../Dashboard/Dashboard.html">
                            <i class="fa-solid fa-chart-line"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                
                    <li>
                        <a href="../Users/Users.html">
                            <i class="fa-solid fa-users"></i>
                            <span>Usuários</span>
                        </a>
                    </li>
                
                    <li>
                        <a href="../VehicleControl/VehicleControl.html">
                            <i class="fa-solid fa-car"></i>
                            <span>Veículos</span>
                        </a>
                    </li>
                
                    <li>
                        <a href="#" class="active">
                            <i class="fa-solid fa-right-left"></i>
                            <span>Movimentações</span>
                        </a>
                    </li>
                
                    <li>
                        <a href="../Reports/Reports.html">
                            <i class="fa-solid fa-chart-column"></i>
                            <span>Relatórios</span>
                        </a>
                    </li>
                </ul>
            
                <div class="sidebar-footer">
                    <div class="user-card">
                        <div class="avatar">
                            A
                        </div>
                    
                        <div class="user-info">
                            <strong>Admin</strong>
                            <span>Administrador</span>
                        </div>
                    </div>
                </div>
            
            </nav>

            <div class="movementsContainer">
                <header class="pageHeader">
                    <div>
                        <h1>Movimentações</h1>
                        <p>
                            Acompanhe todas as entradas e saídas registradas
                            no estacionamento.
                        </p>
                    </div>
                
                    <button class="btn btn-primary" id="refreshMovements">
                        <i class="fa-solid fa-rotate"></i>
                        Atualizar
                    </button>
                
                </header>

                <section class="movementStats">
                
                    <div class="statCard">
                        <h2 id="entriesToday">74</h2>
                        <span>Entradas Hoje</span>
                    </div>
                
                    <div class="statCard">
                        <h2 id="exitsToday">63</h2>
                        <span>Saídas Hoje</span>
                    </div>
                
                    <div class="statCard">
                        <h2 id="insideVehicles">11</h2>
                        <span>Veículos no Pátio</span>
                    </div>
                
                    <div class="statCard">
                        <h2 id="avgTime">2h 18m</h2>
                        <span>Permanência Média</span>
                    </div>
                
                </section>

                <section class="movementFilters">
                
                    <div class="searchBox">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    
                        <input
                            type="text"
                            id="searchPlate"
                            placeholder="Pesquisar placa..."
                        >
                    </div>
                
                    <select id="movementType">
                        <option value="all">Todas</option>
                        <option value="entrada">Entradas</option>
                        <option value="saida">Saídas</option>
                    </select>
                
                </section>

                <section class="movementsGrid" id="movementsGrid">
                
                </section>
            </div>
        </main>
    </body>
</html>
